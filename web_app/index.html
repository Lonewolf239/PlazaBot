<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>🎮 Plaza Casino</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --safe-area-inset-bottom: calc(100vh - var(--tg-viewport-stable-height, 100vh));
            --safe-area-inset-top: 0;
            --safe-area-inset-left: 0;
            --safe-area-inset-right: 0;
        }

        html, body {
            width: 100%;
            height: 100vh;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background-color: var(--tg-theme-bg-color);
            color: var(--tg-theme-text-color);
        }

        body {
            display: flex;
            flex-direction: column;
            height: 100vh;
            height: 100dvh;
            padding-top: var(--safe-area-inset-top);
            padding-left: var(--safe-area-inset-left);
            padding-right: var(--safe-area-inset-right);
            padding-bottom: var(--safe-area-inset-bottom);
        }

        .container {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            width: 100%;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            background-color: var(--tg-theme-secondary-bg-color);
            border-bottom: 1px solid var(--tg-theme-hint-color, rgba(0, 0, 0, 0.1));
            flex-shrink: 0;
        }

        .header h1 {
            font-size: 18px;
            font-weight: 600;
            color: var(--tg-theme-text-color);
            margin: 0;
        }

        .content {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            -webkit-overflow-scrolling: touch;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 16px;
            gap: 12px;
        }

        .content::-webkit-scrollbar {
            width: 6px;
        }

        .content::-webkit-scrollbar-track {
            background: transparent;
        }

        .content::-webkit-scrollbar-thumb {
            background-color: var(--tg-theme-hint-color);
            border-radius: 3px;
        }

        .loading-spinner {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--tg-theme-hint-color);
            font-size: 14px;
        }

        .spinner {
            width: 16px;
            height: 16px;
            border: 2px solid var(--tg-theme-hint-color);
            border-top-color: var(--tg-theme-text-color);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .user-card {
            width: 100%;
            max-width: 400px;
            background-color: var(--tg-theme-secondary-bg-color);
            border-radius: 12px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            border: 1px solid var(--tg-theme-hint-color, rgba(0, 0, 0, 0.05));
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .user-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--tg-theme-button-color), var(--tg-theme-link-color));
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--tg-theme-button-text-color);
            font-weight: 600;
            font-size: 20px;
            flex-shrink: 0;
        }

        .user-details h2 {
            font-size: 16px;
            font-weight: 600;
            color: var(--tg-theme-text-color);
            margin: 0 0 4px 0;
        }

        .user-details p {
            font-size: 13px;
            color: var(--tg-theme-hint-color);
            margin: 0;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            width: 100%;
        }

        .stat-box {
            background-color: var(--tg-theme-bg-color);
            border-radius: 8px;
            padding: 12px;
            text-align: center;
            border: 1px solid var(--tg-theme-secondary-bg-color);
        }

        .stat-box .label {
            font-size: 12px;
            color: var(--tg-theme-hint-color);
            margin-bottom: 4px;
        }

        .stat-box .value {
            font-size: 18px;
            font-weight: 700;
            color: var(--tg-theme-button-color);
        }

        .button-group {
            display: flex;
            gap: 8px;
            width: 100%;
            max-width: 400px;
            flex-direction: column;
        }

        .btn {
            flex: 1;
            padding: 12px 16px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            min-height: 44px;
        }

        .btn-primary {
            background-color: var(--tg-theme-button-color);
            color: var(--tg-theme-button-text-color);
        }

        .btn-primary:active {
            opacity: 0.8;
            transform: scale(0.98);
        }

        .btn-secondary {
            background-color: var(--tg-theme-secondary-bg-color);
            color: var(--tg-theme-text-color);
            border: 1px solid var(--tg-theme-hint-color);
        }

        .btn-secondary:active {
            opacity: 0.7;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .section-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--tg-theme-hint-color);
            margin-top: 16px;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            width: 100%;
            max-width: 400px;
        }

        .link {
            color: var(--tg-theme-link-color);
            text-decoration: none;
            font-weight: 500;
        }

        .link:active {
            opacity: 0.7;
        }

        .footer {
            padding: 12px 16px;
            background-color: var(--tg-theme-secondary-bg-color);
            border-top: 1px solid var(--tg-theme-hint-color, rgba(0, 0, 0, 0.1));
            text-align: center;
            font-size: 12px;
            color: var(--tg-theme-hint-color);
            flex-shrink: 0;
        }

        @media (max-height: 600px) {
            .user-card {
                padding: 12px;
            }

            .btn {
                padding: 10px 14px;
                min-height: 40px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎮 Plaza Casino</h1>
        </div>

        <div class="content">
            
        </div>

        <div class="footer">
            <p style="margin: 0;">Plaza Casino © 2025</p>
        </div>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script src="decrypt_data.js"></script>
    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.MainButton.color = tg.themeParams.button_color;
        tg.MainButton.textColor = tg.themeParams.button_text_color;

        tg.onEvent('themeChanged', () => {updateTheme();});

        tg.onEvent('viewportChanged', () => {updateViewport();});

        function updateTheme() {
            const root = document.documentElement;
            if (tg.themeParams.bg_color)
                root.style.setProperty('--tg-theme-bg-color', '#' + tg.themeParams.bg_color);
            if (tg.themeParams.text_color)
                root.style.setProperty('--tg-theme-text-color', '#' + tg.themeParams.text_color);
        }

        function updateViewport() {
            const root = document.documentElement;
            root.style.setProperty('--safe-area-inset-bottom',
                `calc(100vh - ${tg.viewportHeight || 100}px)`);
        }

        async function loadUserData() {
            const params = new URLSearchParams(window.location.search);
            const encryptedData = params.get('data');

            if (!encryptedData) {
                throw new Error('Параметр "data" не найден в URL');
            }

            const userData = decryptUserData(encryptedData);
            tg.sendData(JSON.stringify(userData));
        }

        tg.ready();
        loadUserData();

        tg.onEvent('closeRequested', () => {tg.close();});
    </script>
</body>
</html>
